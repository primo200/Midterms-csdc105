<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSRO – Fuel Management</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #87CEEB 0%, #0A1172 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 40px rgba(10, 17, 114, 0.4);
            overflow: hidden;
        }

        .header {
            background: #0A1172;
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: nowrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        .header h1 i {
            font-size: 28px;
            color: #87CEEB;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: rgba(135, 206, 235, 0.2);
            color: white;
            border: 1px solid #87CEEB;
            padding: 8px 16px;
            border-radius: 5px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-btn:hover,
        .nav-btn.active {
            background: #87CEEB;
            color: #0A1172;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info span {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(135, 206, 235, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .logout-btn {
            background: #87CEEB;
            color: #0A1172;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: #5FB0D0;
            color: white;
        }

        .content {
            padding: 30px;
        }

        .machines-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .machine-card {
            background: #F0F8FF;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .machine-title {
            font-size: 1.6rem;
            color: #0A1172;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #87CEEB;
            padding-bottom: 10px;
        }

        .fuel-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }

        .fuel-header {
            font-size: 1.3rem;
            font-weight: bold;
            color: #0A1172;
            margin-bottom: 15px;
        }

        .add-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
            margin-bottom: 15px;
        }

        .add-form label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #0A1172;
        }

        .add-form input {
            padding: 6px 10px;
            border: 1px solid #87CEEB;
            border-radius: 6px;
            width: 120px;
        }

        .add-form button {
            background-color: #0A1172;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        .add-form button:hover {
            background-color: #87CEEB;
            color: #0A1172;
        }

        .stock-info {
            font-size: 0.9rem;
            color: #0A1172;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stock-input-group {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .stock-input-group input {
            width: 80px;
            padding: 4px;
        }

        .stock-low {
            color: #dc3545;
            font-weight: bold;
        }

        .transaction-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .transaction-table th,
        .transaction-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        .transaction-table th {
            background: #d1ecf1;
            color: #0A1172;
        }

        .total-row {
            background-color: #f0f0f0;
            font-weight: bold;
        }

        .flash-messages {
            margin-bottom: 20px;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            color: #0A1172;
            padding: 10px;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header" style="flex-direction: column; align-items: flex-start; gap: 12px;">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <h1><i class="fas fa-gas-pump"></i> TSRO Fuel Management</h1>
                <div class="user-info">
                    <span>
                        <i class="fas fa-user"></i>
                        {{ session.username }}
                    </span>
                    <a href="{{ url_for('logout') }}" class="logout-btn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </div>
            <div class="nav-buttons">
                <a href="{{ url_for('home') }}" class="nav-btn"><i class="fas fa-home"></i> Home</a>
                <a href="{{ url_for('users_list') }}" class="nav-btn"><i class="fas fa-users"></i> Users</a>
                <a href="{{ url_for('products') }}" class="nav-btn"><i class="fas fa-box"></i> Stock</a>
                <a href="{{ url_for('transactions') }}" class="nav-btn"><i class="fas fa-receipt"></i> Transactions</a>
                <a href="{{ url_for('fuel') }}" class="nav-btn active"><i class="fas fa-gas-pump"></i> Fuel</a>
                <a href="{{ url_for('history') }}" class="nav-btn"><i class="fas fa-history"></i> History</a>
                <a href="{{ url_for('sales') }}" class="nav-btn"><i class="fas fa-chart-line"></i> Sales</a>
            </div>
        </div>
        <div class="content">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <!-- Machine Cards -->
            <div class="machines-grid" id="machines-container">
                <p class="loading">Loading machines...</p>
            </div>
        </div>
    </div>

    <script>
        const csrfToken = "{{ csrf_token() }}";
        const MAX_MACHINES = 2;
        const FUEL_TYPES = ['Unleaded', 'Diesel'];

        const stockState = {};
        const transactionRows = {};

        async function loadAllStock() {
            const res = await fetch('/get_fuel_stock');
            const data = await res.json();
            for (const s of data) {
                stockState[`${s.machine_number}-${s.fuel_type}`] = s.stock_liters;
            }
        }

        async function loadAllTransactions() {
            const res = await fetch('/get_fuel_transactions');
            const data = await res.json();
            for (const key in transactionRows) transactionRows[key] = [];
            for (const t of data) {
                const key = `${t.machine_number}-${t.fuel_type}`;
                if (!transactionRows[key]) transactionRows[key] = [];
                transactionRows[key].push(t);
            }
        }

        function renderStockDisplay(machine, fuel) {
            const key = `${machine}-${fuel}`;
            const stock = stockState[key] ?? 0;
            const elem = document.getElementById(`stock-${machine}-${fuel}`);
            if (elem) {
                elem.textContent = parseFloat(stock).toFixed(2);
                elem.className = stock <= 300 ? 'stock-low' : '';
            }
        }

        function renderTransactionTable(machine, fuel) {
            const key = `${machine}-${fuel}`;
            const tbody = document.querySelector(`#trans-table-${machine}-${fuel} tbody`);
            if (!tbody) return;
            tbody.innerHTML = '';
            const rows = transactionRows[key] || [];
            let totalAmount = 0, totalLiters = 0;
            rows.forEach((t, i) => {
                totalAmount += parseFloat(t.amount);
                totalLiters += parseFloat(t.liters);
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${i + 1}</td>
                    <td>₱${parseFloat(t.amount).toFixed(2)}</td>
                    <td>${parseFloat(t.liters).toFixed(3)}</td>
                    <td>${new Date(t.created_at).toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });
            const totalAmountEl = document.getElementById(`total-amount-${machine}-${fuel}`);
            const totalLitersEl = document.getElementById(`total-liters-${machine}-${fuel}`);
            if (totalAmountEl) totalAmountEl.textContent = `₱${totalAmount.toFixed(2)}`;
            if (totalLitersEl) totalLitersEl.textContent = totalLiters.toFixed(3);
        }

        async function addStock(machine, fuel) {
            const input = document.getElementById(`add-stock-${machine}-${fuel}`);
            const addVal = parseFloat(input.value);
            if (isNaN(addVal) || addVal <= 0) { alert('Enter a valid amount'); return; }
            const res = await fetch('/add_fuel_stock', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                body: JSON.stringify({ machine_number: machine, fuel_type: fuel, add_liters: addVal })
            });
            const data = await res.json();
            if (data.success) {
                stockState[`${machine}-${fuel}`] = data.new_stock;
                renderStockDisplay(machine, fuel);
                input.value = '';
            } else {
                alert(data.error);
            }
        }

        async function addTransaction(event, machine, fuel) {
            event.preventDefault();
            const amountInput = document.getElementById(`amount-${machine}-${fuel}`);
            const priceInput = document.getElementById(`price-${machine}-${fuel}`);
            const amount = parseFloat(amountInput.value);
            const price = parseFloat(priceInput.value);
            if (isNaN(amount) || amount <= 0 || isNaN(price) || price <= 0) return;
            const liters = amount / price;

            const res = await fetch('/save_fuel_transaction', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                body: JSON.stringify({ machine_number: machine, fuel_type: fuel, amount, liters, price_per_liter: price })
            });
            const data = await res.json();

            if (data.success) {
                stockState[`${machine}-${fuel}`] = data.new_stock;
                renderStockDisplay(machine, fuel);
                if (data.new_stock <= 300) alert(`⚠️ Low stock! Machine ${machine} - ${fuel}: ${data.new_stock.toFixed(2)} L remaining`);
                const key = `${machine}-${fuel}`;
                if (!transactionRows[key]) transactionRows[key] = [];
                transactionRows[key].unshift({ amount, liters, created_at: data.created_at });
                renderTransactionTable(machine, fuel);
                amountInput.value = '';
            } else {
                alert('Error: ' + data.error);
            }
        }

        function buildMachines() {
            const container = document.getElementById('machines-container');
            container.innerHTML = '';
            for (let m = 1; m <= MAX_MACHINES; m++) {
                const machineDiv = document.createElement('div');
                machineDiv.className = 'machine-card';
                machineDiv.innerHTML = `<div class="machine-title"><i class="fas fa-tachometer-alt"></i> Machine ${m}</div>`;
                for (let fuel of FUEL_TYPES) {
                    machineDiv.innerHTML += `
                        <div class="fuel-card">
                            <div class="fuel-header">${fuel}</div>
                            <div class="stock-info">
                                <span>Stock: <strong id="stock-${m}-${fuel}">Loading...</strong> L</span>
                                <div class="stock-input-group">
                                    <input type="number" id="add-stock-${m}-${fuel}" step="10" placeholder="Add L" min="1">
                                    <button onclick="addStock(${m}, '${fuel}')">+</button>
                                </div>
                            </div>
                            <form class="add-form" onsubmit="addTransaction(event, ${m}, '${fuel}')">
                                <div><label>Amount (₱)</label><input type="number" step="0.01" id="amount-${m}-${fuel}" required></div>
                                <div><label>Price/L (₱)</label><input type="number" step="0.01" id="price-${m}-${fuel}" value="60" required></div>
                                <button type="submit">Sell</button>
                            </form>
                            <table class="transaction-table" id="trans-table-${m}-${fuel}">
                                <thead><tr><th>#</th><th>Amount</th><th>Liters</th><th>Date</th></tr></thead>
                                <tbody></tbody>
                                <tfoot>
                                    <tr class="total-row"><td colspan="2">Total Amount:</td><td id="total-amount-${m}-${fuel}" colspan="2">₱0.00</td></tr>
                                    <tr class="total-row"><td colspan="2">Total Liters:</td><td id="total-liters-${m}-${fuel}" colspan="2">0.000</td></tr>
                                </tfoot>
                            </table>
                        </div>
                    `;
                }
                container.appendChild(machineDiv);
            }
        }

        async function initPage() {
            buildMachines();
            await loadAllStock();
            await loadAllTransactions();
            for (let m = 1; m <= MAX_MACHINES; m++) {
                for (let fuel of FUEL_TYPES) {
                    renderStockDisplay(m, fuel);
                    renderTransactionTable(m, fuel);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>

</html>
